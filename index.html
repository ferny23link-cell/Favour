<!DOCTYPE html>
<html>
<head>
  <title>Lavour</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }

    .topbar {
      background: black;
      color: white;
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
    }

    .layout {
      display: flex;
      justify-content: center;
      margin-top: 20px;
    }

    .container {
      width: 1000px;
      display: flex;
      gap: 15px;
    }

    .sidebar {
      width: 200px;
      background: white;
      padding: 10px;
      height: fit-content;
    }

    .main {
      flex: 1;
    }

    .card {
      background: white;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 8px;
    }

    .ad {
      background: #ddd;
      padding: 10px;
      text-align: center;
      margin-bottom: 10px;
      border-radius: 6px;
      font-size: 12px;
    }

    input, textarea, select {
      width: 100%;
      margin: 5px 0;
      padding: 8px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }

    .favor {
      border-bottom: 1px solid #eee;
      padding: 10px 0;
    }

    .smallad {
      background: #e0e0e0;
      padding: 8px;
      text-align: center;
      font-size: 12px;
      margin: 10px 0;
    }

    .category {
      padding: 5px;
      cursor: pointer;
    }

    .category:hover {
      background: #eee;
    }
  </style>
</head>

<body>

<div class="topbar">Lavour</div>

<div class="layout">
  <div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <b>Categories</b>
      <div class="category" onclick="filter('all')">All</div>
      <div class="category" onclick="filter('urgent')">Urgent</div>
      <div class="category" onclick="filter('online')">Online</div>
      <div class="category" onclick="filter('local')">Local</div>

      <div class="smallad">Ad Space</div>
    </div>

    <!-- MAIN -->
    <div class="main">

      <div class="ad">TOP AD SPACE</div>

      <div class="card">
        <h3>Post a Favor</h3>

        <select id="category">
          <option value="general">General</option>
          <option value="urgent">Urgent</option>
          <option value="online">Online</option>
          <option value="local">Local</option>
        </select>

        <input id="title" placeholder="Title">
        <textarea id="desc" placeholder="Description"></textarea>

        <button onclick="postFavor()">Post</button>
      </div>

      <div class="ad">MIDDLE AD SPACE</div>

      <div class="card">
        <b>Feed</b>
        <div id="favors"></div>
      </div>

    </div>

  </div>
</div>

<script>
const API = "http://localhost:3000";
let currentFilter = "all";

async function loadFavors() {
  const res = await fetch(API + "/favors");
  const data = await res.json();

  let filtered = data;
  if (currentFilter !== "all") {
    filtered = data.filter(f => f.category === currentFilter);
  }

  document.getElementById("favors").innerHTML =
    filtered.map(f => `
      <div class="favor">
        <b>${f.title}</b><br>
        ${f.description}<br>
        <small>${f.category}</small>
      </div>
    `).join("");
}

async function postFavor() {
  const title = document.getElementById("title").value;
  const desc = document.getElementById("desc").value;
  const category = document.getElementById("category").value;

  await fetch(API + "/favors", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      title,
      description: desc,
      category
    })
  });

  loadFavors();
}

function filter(type) {
  currentFilter = type;
  loadFavors();
}

loadFavors();
</script>

</body>
</html>
